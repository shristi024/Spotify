<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <ul><li class="logo"><img src="logo.png" alt="Spotify"></li></ul>
        <div class="home-search">
            <div class="nav-home">
               <img src="Home-icon.png">
            </div>
            <div class="nav-search">
              <div class="search-left">
                <img src="search-icon.png">
                <p>What do you want to play?</p>
              </div>    
            <img src="browse.png" class="browse">
            </div>
        </div>
        <ul>
            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>
    <div class="library-options">
        <div class="lib-options">
          <div class="lib">
            <div><p>YourLibrary</p></div>
            <div class="create">
               <img src="Plus.png">
               <p>Create</p>
            </div>
          </div>
          <div class="options">
              <div class="op"><p>Playlists</p></div>
              <div class="op"><p>Artists</p></div>
              <div class="op"><p>Albums</p></div>
          </div>
          <div class="library">
              <div class="search-lib">
                  <img src="search-2.png">
              </div>
          </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
