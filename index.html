<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <ul><li class="logo"><img src="logo.png" alt="Spotify"></li></ul>
        <div class="home-search">
            <div class="nav-home">
               <img src="Home-icon.png">
            </div>
            <div class="nav-search">
              <div class="search-left">
                <img src="search-icon.png">
                <p>What do you want to play?</p>
              </div>    
            <img src="browse.png" class="browse">
            </div>
        </div>
        <ul>
            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>

    <div class="home">
      <div class="library-options">
        <div class="lib-options">
          <div class="lib">
            <div><p>YourLibrary</p></div>
            <div class="create">
               <img src="Plus.png">
               <p>Create</p>
            </div>
          </div>
          <div class="options">
              <div class="op"><p>Playlists</p></div>
              <div class="op"><p>Artists</p></div>
              <div class="op"><p>Albums</p></div>
          </div>
          <div class="library">
              <div class="search-lib">
                  <img src="search-2.png">
              </div>
              <div class="lib-songs" onclick="openPlaylist('Enhypen')">
                <img src="Enhypen.jfif"><p>Enhypen</p>
              </div>
              <div class="lib-songs" onclick="openPlaylist('kpop')">
                <img src="Kpop.jfif"><p>kpop</p>
              </div>
              <div class="lib-songs" onclick="openPlaylist('English')">
                <img src="English.jfif"><p>English</p>
            </div>
            <div class="lib-songs" onclick="openPlaylist('Punjabi')">
                <img src="Punjabi.png"><p>Punjabi</p>
            </div>
            <div class="lib-songs" onclick="openPlaylist('Old bollywood')">
                <img src="Old bollywood.jfif"><p>Old Bollywood</p>
            </div>
            <div class="lib-songs" onclick="openPlaylist('bollywood')">
                <img src="Bollywood.jfif"><p>Bollywood</p>
            </div>
          </div>
        </div>
      </div>
      <div class="songs">
        <div class="song-options">
          <div class="so"><p>Playlists</p></div>
          <div class="so"><p>Songs</p></div>
        </div>
        <div class="Music">
            <div class="first">
              <div class="playlist" onclick="openPlaylist('Enhypen')">
                <img src="Enhypen.jfif"><p>Enhypen</p>
              </div>
              <div class="playlist" onclick="openPlaylist('Kpop')">
                <img src="Kpop.jfif"><p>kpop</p>
              </div>
            </div>
            <div class="second">
              <div class="playlist" onclick="openPlaylist('English')">
                <img src="English.jfif"><p>English</p>
              </div>
              <div class="playlist" onclick="openPlaylist('Punjabi')">
                <img src="Punjabi.png"><p>Punjabi</p>
              </div>
            </div>
            <div class="headphone">
                <img src="Headphone.jpg" alt="">
            </div>
        </div>
      </div>                                                 <!-- songs ka div--> 
      
           
      <div class="playlist-page" id="playlist-page" style="display:none">
        <button onclick="goBack()" class="back-btn">← Back</button>
        <h2 id="playlist-title"></h2>
        <div id="song-list"></div>  
      </div>


      <div class="song-player">
        <img src="Enhypen.jfif" alt="">
        <div class="song-info">
            <p>Playlist- Enhypen</p>
            <p>Artist- Enhypen</p>
            <p>Song- XO</p>
        </div>
        <div class="player">
            <img src="Previous.png">
            <img src="Player.png">
            <img src="Next.png"> 
        </div>
        <div class="progressbar">
        <input type="range" name="range" id="myprogressbar" min="0" max="100">
        </div>

      </div>                                                 <!--song-player ka div-->

    </div>

    <script src="script.js"></script>
</body>
</html>
