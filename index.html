<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <ul><li class="logo"><img src="logo.png" alt="Spotify"></li></ul>
        <div class="home-search">
            <div class="nav-home">
               <img src="Home-icon.png">
            </div>
            <div class="nav-search">
              <div class="search-left">
                <img src="search-icon.png">
                <p>What do you want to play?</p>
              </div>    
            <img src="browse.png" class="browse">
            </div>
        </div>
        <ul>
            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>

    <div class="home">
      <div class="library-options">
        <div class="lib-options">
          <div class="lib">
            <div><p>YourLibrary</p></div>
            <div class="create">
               <img src="Plus.png">
               <p>Create</p>
            </div>
          </div>
          <div class="options">
              <div class="op"><p>Playlists</p></div>
              <div class="op"><p>Artists</p></div>
              <div class="op"><p>Albums</p></div>
          </div>
          <div class="library">
              <div class="search-lib">
                  <img src="search-2.png">
              </div>
              <div class="lib-songs">
                <img src="Enhypen.jfif"><p>Enhypen</p>
              </div>
              <div class="lib-songs">
                <img src="Kpop.jfif"><p>kpop</p>
              </div>
              <div class="lib-songs">
                <img src="English.jfif"><p>English</p>
            </div>
            <div class="lib-songs">
                <img src="Punjabi.png"><p>Punjabi</p>
            </div>
            <div class="lib-songs">
                <img src="Old bollywood.jfif"><p>Old Bollywood</p>
            </div>
            <div class="lib-songs">
                <img src="Bollywood.jfif"><p>Bollywood</p>
            </div>
          </div>
        </div>
      </div>
      <div class="songs">
        <div class="song-options">
          <div class="so"><p>Playlists</p></div>
          <div class="so"><p>Songs</p></div>
        </div>
        <div class="Music">
            <div class="first">
              <div class="playlist">
                <img src="Enhypen.jfif"><p>Enhypen</p>
              </div>
              <div class="playlist">
                <img src="Kpop.jfif"><p>kpop</p>
              </div>
            </div>
            <div class="second">
              <div class="playlist">
                <img src="English.jfif"><p>English</p>
              </div>
              <div class="playlist">
                <img src="Punjabi.png"><p>Punjabi</p>
              </div>
            </div>
            <div class="headphone">
                <img src="Headphone.jpg" alt="">
            </div>
        </div>
      </div>                                                 <!-- songs ka div--> 
      
      <div class="song-player">
      </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
